services:
  # ========================================
  # Base de Datos MySQL
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: hce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hce_prueba2}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      # Persistencia de datos
      - mysql-data:/var/lib/mysql
      - ./db/patches/001-fix-azuay-parroquias.sql:/docker-entrypoint-initdb.d/02-fix-azuay-parroquias.sql:ro
      - ./db/patches/002-referencia-medica.sql:/docker-entrypoint-initdb.d/03-referencia-medica.sql:ro
      - ./db/patches/003-agregar-enfermedades-cie10.sql:/docker-entrypoint-initdb.d/04-agregar-enfermedades-cie10.sql:ro
      - ./db/patches/004-anio-escolar.sql:/docker-entrypoint-initdb.d/05-anio-escolar.sql:ro
      - ./db/patches/011-catalogos-geograficos.sql:/docker-entrypoint-initdb.d/12-catalogos-geograficos.sql:ro
    expose:
      - "3306"
    networks:
      - hce-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ========================================
  # Backend Spring Boot
  # ========================================
  backend:
    build:
      context: ./backend-hce
      dockerfile: Dockerfile
    container_name: hce-backend
    restart: unless-stopped
    environment:
      # Variables de base de datos
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-hce_prueba2}?useSSL=false&serverTimezone=America/Guayaquil&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://hce.codifyhub.dev}
      HCE_DEFAULT_USER_PASSWORD: ${HCE_DEFAULT_USER_PASSWORD}
      TZ: America/Guayaquil
      JAVA_TOOL_OPTIONS: -Duser.timezone=America/Guayaquil

      # Spring profile (opcional)
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # Configuración JVM (para producción)
      JAVA_OPTS: -Xms512m -Xmx1024m
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - hce-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ========================================
  # Frontend React + Vite + Nginx
  # ========================================
  frontend:
    build:
      context: ./hce_frontend
      dockerfile: Dockerfile
    container_name: hce-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - hce-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ========================================
  # Proxy inverso HTTPS
  # ========================================
  reverse-proxy:
    image: nginx:alpine
    container_name: hce-reverse-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - hce-network
    # Recarga Nginx periódicamente para adoptar certificados renovados.
    command:
      - /bin/sh
      - -c
      - |
        (while :; do sleep 6h; nginx -s reload; done) &
        exec nginx -g 'daemon off;'
    healthcheck:
      test: [ "CMD", "wget", "--no-check-certificate", "--no-verbose", "--tries=1", "--spider", "https://127.0.0.1/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Se ejecuta una sola vez antes del primer arranque del proxy:
  # docker compose --profile cert-init run --rm --service-ports certbot-init
  certbot-init:
    image: certbot/certbot:latest
    profiles: [ "cert-init" ]
    container_name: hce-certbot-init
    ports:
      - "80:80"
    volumes:
      - certbot-conf:/etc/letsencrypt
    command:
      - certonly
      - --standalone
      - --preferred-challenges
      - http
      - --agree-tos
      - --register-unsafely-without-email
      - --non-interactive
      - -d
      - hce.codifyhub.dev

  # Comprueba y renueva el certificado dos veces al día mediante webroot.
  certbot:
    image: certbot/certbot:latest
    container_name: hce-certbot
    restart: unless-stopped
    depends_on:
      reverse-proxy:
        condition: service_started
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - hce-network
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot --webroot-path /var/www/certbot --quiet
          sleep 12h & wait $$!
        done

# ========================================
# Volúmenes persistentes
# ========================================
volumes:
  mysql-data:
    driver: local
    name: hce-mysql-data
  certbot-conf:
    name: hce-certbot-conf
  certbot-www:
    name: hce-certbot-www

# ========================================
# Red interna
# ========================================
networks:
  hce-network:
    driver: bridge
    name: hce-network
